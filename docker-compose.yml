services:
  postgres:
    image: postgres:16-alpine
    container_name: fitjourney-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitjourney}
      POSTGRES_USER: ${POSTGRES_USER:-fitjourney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitjourney}
    ports:
      - "5432:5432"
    volumes:
      - fitjourney_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitjourney} -d ${POSTGRES_DB:-fitjourney}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fitjourney_pgdata:
