  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-java@v4
  #       with:
  #         distribution: temurin
  #         java-version: '21'
  #     - uses: gradle/actions/setup-gradle@v4
  #     - run: chmod +x ./gradlew
  #     # Alvo = módulo umbrella que exporta o framework (a criar).
  #     # Ex.: :shared:umbrella:linkDebugFrameworkIosSimulatorArm64
  #     - run: ./gradlew :shared:umbrella:linkDebugFrameworkIosSimulatorArm64 --stacktrace
  # ──────────────────────────────────────────────────────────────────