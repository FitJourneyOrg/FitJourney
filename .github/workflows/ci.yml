name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Valida o checksum do gradle-wrapper.jar (evita wrapper adulterado).
      - uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'   # = toolchain do projeto; Gradle roda e compila no mesmo JDK

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4   # cache do Gradle user home + daemon entre steps

      # Repo criado no Windows costuma perder o bit de exec do gradlew.
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Architecture lint (Konsist)
        run: ./gradlew :konsist:test

      - name: Build & test server
        run: ./gradlew :server:build