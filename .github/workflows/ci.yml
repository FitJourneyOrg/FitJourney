name: CI

# Quando rodar: a cada PR aberto/atualizado para develop ou main,
# e também quando algo entra (push) nessas branches.
on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]

# Se você empurrar um commit novo numa branch que já tem CI rodando,
# cancela o anterior pra não gastar minutos à toa.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-common:
    name: Build Android + testes (common, server)
    runs-on: ubuntu-latest   # runner Linux = grátis/barato; cobre Android + JVM
    steps:
      # 1. Baixa o código do PR
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instala o JDK (AGP 9 / Kotlin 2.4 exigem JDK 17+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Configura o Gradle com cache (acelera builds seguintes)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. Garante que o wrapper é executável no Linux
      - name: Tornar gradlew executável
        run: chmod +x ./gradlew

      # 5. Compila o app Android — isso arrasta TODOS os módulos
      #    compartilhados (sharedUI, sharedLogic, features, core, data,
      #    shared-contract) pro alvo Android, validando que tudo compila.
      - name: Build do app Android
        run: ./gradlew :app:androidApp:assembleDebug --stacktrace

      # 6. Roda os testes: unidade do Android (inclui commonTest) + servidor
      - name: Rodar testes
        run: ./gradlew testDebugUnitTest :server:test --stacktrace

  # ──────────────────────────────────────────────────────────────────
  # Job opcional de iOS. Só roda em runner macOS, que consome ~10x mais
  # minutos. Descomente quando quiser validar o lado iOS no CI também.
