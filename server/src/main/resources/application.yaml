ktor:
  deployment:
    port: "$PORT:8080"
  application:
    modules:
      - dev.rafael.server.ApplicationKt.module
db:
  jdbcUrl: "$DB_JDBC_URL:jdbc:postgresql://localhost:5432/fitjourney"
  username: "$DB_USER:fitjourney"
  password: "$DB_PASSWORD:fitjourney"
  driver: "org.postgresql.Driver"
  maxPoolSize: "$DB_MAX_POOL_SIZE:5"
firebase:
  credentialsPath: "$FIREBASE_CREDENTIALS_PATH:./secrets/firebase-admin.json"